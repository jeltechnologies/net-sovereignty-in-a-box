name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: portal
            context: ./portal
          - image: init
            context: ./init
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}:latest

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog since previous tag
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -Fxv "$GITHUB_REF_NAME" | head -n1)
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG_BODY.md
            echo "" >> CHANGELOG_BODY.md
            git log "${PREV_TAG}..${GITHUB_REF_NAME}" --pretty=format:'- %s (%h)' >> CHANGELOG_BODY.md
          else
            echo "## Changes" > CHANGELOG_BODY.md
            echo "" >> CHANGELOG_BODY.md
            git log "$GITHUB_REF_NAME" --pretty=format:'- %s (%h)' >> CHANGELOG_BODY.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md

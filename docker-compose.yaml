# =============================================================================
# Xray VLESS+REALITY Stack — client identity and REALITY keypair are
# auto-generated on first start by the `init` service, not hardcoded.
# =============================================================================
networks:
  xray-net:
    driver: bridge

services:

  # ── 0. Identity generator — creates UUID/shortId/SNI once, on first start ──
  init:
    build:
      context: ./init
    image: ghcr.io/jeltechnologies/net-sovereignty-in-a-box-init:latest
    container_name: net-sovereignty-in-a-box-init
    volumes:
      - ./data:/etc/xray
    environment:
      # Camouflage domain used only on first start, when the identity is
      # generated (see the top-level comment above). Edit this value
      # directly if www.microsoft.com isn't a good fit for you — it must be
      # a globally trusted, unblocked, high-traffic domain your local ISP
      # lets you reach freely (other options: aspnetcdn.com, www.apple.com,
      # swcdn.apple.com).
      SNI_DOMAIN: www.microsoft.com

  # ── 1. Xray core (VLESS+REALITY) ───────────────────────────────────────────
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - xray-net
    ports:
      - "443:443/tcp"
    volumes:
      - ./data:/etc/xray
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # ── 2. Web portal (QR code + JSON) ──────────────────────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: ghcr.io/jeltechnologies/net-sovereignty-in-a-box-portal:latest
    container_name: net-sovereignty-in-a-box-portal
    restart: unless-stopped
    networks:
      - xray-net
    ports:
      - "16810:8080"
    volumes:
      - ./data:/etc/xray:ro
    environment:
      XRAY_PORT: "443"
      # Basic Auth for the portal. Left blank on purpose — the portal
      # exposes your UUID, REALITY keys, and VLESS link, so you must set
      # both directly here before it will serve any connection details.
      PORTAL_USER_NAME: "admin"
      PORTAL_PASSWORD: "admin"
    depends_on:
      init:
        condition: service_completed_successfully
      xray:
        condition: service_started

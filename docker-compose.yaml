# =============================================================================
# Xray VLESS+REALITY Stack — client identity and REALITY keypair are
# auto-generated on first start by the `init` service, not hardcoded.
# =============================================================================
networks:
  xray-net:
    driver: bridge

services:

  # ── 0. Identity generator — creates UUID/shortId/SNI once, on first start ──
  init:
    build:
      context: ./init
    image: ghcr.io/jeltechnologies/net-sovereignty-in-a-box-init:latest
    container_name: net-sovereignty-in-a-box-init
    volumes:
      - ./data:/etc/xray
    environment:
      # Camouflage domain used only on first start, when the identity is
      # generated (see the top-level comment above). Set in .env if
      # swcdn.apple.com isn't a good fit for you — it must be a globally
      # trusted, unblocked, high-traffic domain your local ISP lets you
      # reach freely (other options: aspnetcdn.com, www.apple.com,
      # www.microsoft.com). See .env.example.
      SNI_DOMAIN: ${SNI_DOMAIN:-swcdn.apple.com}

  # ── 1. Xray core (VLESS+REALITY) ───────────────────────────────────────────
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - xray-net
    ports:
      - "443:443/tcp"
    volumes:
      - ./data:/etc/xray
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── 2. Web portal (QR code + JSON) ──────────────────────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: ghcr.io/jeltechnologies/net-sovereignty-in-a-box-portal:latest
    container_name: net-sovereignty-in-a-box-portal
    restart: unless-stopped
    networks:
      - xray-net
    ports:
      - "16810:8080"
      # Answers Let's Encrypt's HTTP-01 challenge only (see DOMAIN below) — every other
      # path on this port 404s, nothing else is ever served here.
      - "80:8880"
    volumes:
      - ./data:/etc/xray:ro
      # More specific mount overrides the :ro above for just this subdirectory — the portal
      # needs to write here (self-signed cert reuse, and to install/renew Let's Encrypt
      # certificates), but stays read-only for identity.env/config.json, which it never writes.
      - ./data/tls:/etc/xray/tls
    environment:
      XRAY_PORT: "${XRAY_PORT:-443}"
      # Optional. Point a real domain's DNS A/AAAA record at this server and set it in
      # .env to get an automatically issued and renewed Let's Encrypt certificate —
      # requires port 80 above to be reachable from the internet (forward it on your
      # router if you're behind NAT). Leave blank to keep using the self-signed
      # certificate that's generated automatically on first start; HTTPS works either way.
      DOMAIN: "${DOMAIN:-}"
      # Basic Auth for the portal. Left blank on purpose — the portal
      # exposes your UUID, REALITY keys, and VLESS link, so you must set
      # both in .env before it will serve any connection details. See .env.example.
      PORTAL_USER_NAME: "${PORTAL_USER_NAME:-}"
      PORTAL_PASSWORD: "${PORTAL_PASSWORD:-}"
    depends_on:
      init:
        condition: service_completed_successfully
      xray:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

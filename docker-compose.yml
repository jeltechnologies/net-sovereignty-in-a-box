# =============================================================================
# Xray VLESS+REALITY Stack — credentials hardcoded, no .env needed
# =============================================================================
networks:
  xray-net:
    driver: bridge

services:

  # ── 1. Xray core (VLESS+REALITY) ───────────────────────────────────────────
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    networks:
      - xray-net
    ports:
      - "443:443/tcp"
    volumes:
      - ./xray/config:/etc/xray
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # ── 2. Web portal (QR code + JSON, via Newt only) ──────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: xray-portal:local
    pull_policy: build
    container_name: xray-portal
    restart: unless-stopped
    networks:
      - xray-net
    expose:
      - "8080"
    environment:
      VLESS_LINK: 'vless://faf28d1f-dd18-4091-aa3f-f10419190a74@95.179.165.162:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni=www.cloudflare.com&fp=chrome&pbk=NgQGJAT8JYwvzzIzfm_nt_OF2wAV-Rw1G2NdH_fHrB8&sid=f5c052938ba0aacf&type=tcp#Xray-REALITY'
      UUID: "faf28d1f-dd18-4091-aa3f-f10419190a74"
      PUBLIC_KEY: "NgQGJAT8JYwvzzIzfm_nt_OF2wAV-Rw1G2NdH_fHrB8"
      SHORT_ID: "f5c052938ba0aacf"
      SNI_DOMAIN: "www.cloudflare.com"
      XRAY_PORT: "443"
      PUBLIC_IP: "95.179.165.162"
    depends_on:
      - xray

  # ── 3. Newt (Pangolin tunnel) ───────────────────────────────────────────────
  newt:
    image: fosrl/newt:latest
    container_name: newt
    restart: unless-stopped
    network_mode: "service:portal"
    environment:
      NEWT_ID: "210lmkm0ctcvhqa"
      NEWT_SECRET: "***REMOVED***"
      PANGOLIN_ENDPOINT: "https://pangolin.jeltechnologies.com"
    depends_on:
      - portal

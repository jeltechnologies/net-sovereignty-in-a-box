# =============================================================================
# Xray VLESS+REALITY Stack — credentials hardcoded, no .env needed
# =============================================================================
networks:
  xray-net:
    driver: bridge

services:

  # ── 0. Identity generator — creates UUID/shortId/SNI once, on first start ──
  identity:
    build:
      context: ./xray/init
    image: xray-identity:local
    pull_policy: build
    container_name: xray-identity
    volumes:
      - ./xray/config:/etc/xray

  # ── 1. Xray core (VLESS+REALITY) ───────────────────────────────────────────
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    depends_on:
      identity:
        condition: service_completed_successfully
    networks:
      - xray-net
    ports:
      - "443:443/tcp"
    volumes:
      - ./xray/config:/etc/xray
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # ── 2. Web portal (QR code + JSON, via Newt only) ──────────────────────────
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: xray-portal:local
    pull_policy: build
    container_name: xray-portal
    restart: unless-stopped
    networks:
      - xray-net
    ports:
      - "16810:8080"
    volumes:
      - ./xray/config:/etc/xray:ro
    environment:
      PUBLIC_KEY: "NgQGJAT8JYwvzzIzfm_nt_OF2wAV-Rw1G2NdH_fHrB8"
      XRAY_PORT: "443"
    depends_on:
      identity:
        condition: service_completed_successfully
      xray:
        condition: service_started

  # ── 3. Newt (Pangolin tunnel) ───────────────────────────────────────────────
  newt:
    image: fosrl/newt:latest
    container_name: newt
    restart: unless-stopped
    network_mode: "service:portal"
    environment:
      NEWT_ID: "210lmkm0ctcvhqa"
      NEWT_SECRET: "***REMOVED***"
      PANGOLIN_ENDPOINT: "https://pangolin.jeltechnologies.com"
    depends_on:
      - portal

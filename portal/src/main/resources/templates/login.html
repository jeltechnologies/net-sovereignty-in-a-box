<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#F7F5EF"/>
<title>Net Sovereignty in a Box - Sign in</title>
<style>
  :root{
    --page:   #EFEAD9;
    --paper:  #F7F5EF;
    --ink:    #16213E;
    --label:  #8A8471;
    --accent: #B54E1D;
    --line:   #D9D2BC;
    --error:  #B3261E;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--page);
    background-image:radial-gradient(ellipse at top, rgba(255,255,255,.5), transparent 60%);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }

  .card{
    width:100%;
    max-width:340px;
    background:var(--paper);
    border-radius:18px;
    box-shadow:0 1px 2px rgba(22,33,62,.06), 0 18px 40px -20px rgba(22,33,62,.28);
    padding:28px 26px 26px;
  }
  h1{
    margin:0 0 20px;
    font-size:.95rem;
    font-weight:600;
    letter-spacing:.02em;
  }
  label{
    display:block;
    font-size:.68rem;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--label);
    margin:0 0 6px;
  }
  input{
    width:100%;
    font-family:inherit;
    font-size:.9rem;
    color:var(--ink);
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 11px;
    margin:0 0 16px;
  }
  input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  button{
    width:100%;
    font-family:inherit;
    font-size:.85rem;
    font-weight:600;
    color:var(--paper);
    background:var(--ink);
    border:none;
    border-radius:8px;
    padding:10px;
    cursor:pointer;
  }
  button:hover{background:#0f1730}
  .error{
    font-size:.78rem;
    color:var(--error);
    margin:-6px 0 16px;
  }
</style>
</head>
<body>

<main class="card">
  <h1>Sign in to Net Sovereignty in a Box</h1>
  <p class="error" th:if="${error}">Wrong username or password.</p>
  <form method="post" action="/login">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required autofocus/>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required/>
    <button type="submit">Sign in</button>
  </form>
</main>

</body>
</html>
